name: Django Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the code from GitHub repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: Set up Python environment (version 3.11)
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip" # Cache dependencies to speed up future builds

    # Step 3: Upgrade pip and install package dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Run Django migrations to build database schema
    - name: Run Migrations
      run: |
        python manage.py migrate

    # Step 5: Run automated test suite with pytest
    - name: Run Test Suite
      run: |
        pytest
